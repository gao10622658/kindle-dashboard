<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>дҝЎжҒҜеұҸ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue',system-ui,sans-serif;transition:all .5s;min-height:100vh;overflow-x:hidden}
.wrap{max-width:500px;margin:0 auto;padding:18px 20px}
.card{border-radius:14px;padding:14px 16px;margin-bottom:10px}
.row{display:-webkit-box;display:flex;-webkit-box-pack:justify;justify-content:space-between;-webkit-box-align:start;align-items:flex-start}
.greet{font-size:13px;font-weight:600;margin-bottom:3px}
.clock{font-size:56px;font-weight:800;letter-spacing:-3px;line-height:.85}
.clock .sep{font-weight:200}
.date{font-size:12px;margin-top:6px}
.wx{text-align:right;cursor:pointer}
.wx-icon{font-size:36px;font-weight:200;line-height:1}
.wx-temp{font-size:24px;font-weight:700;line-height:1;margin-top:2px}
.wx-info{font-size:10px;margin-top:3px}
.wx-city{font-size:9px;margin-top:2px}
.hdr{display:-webkit-box;display:flex;-webkit-box-pack:justify;justify-content:space-between;-webkit-box-align:center;align-items:center;margin-bottom:8px}
.hdr-title{font-size:14px;font-weight:700;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:7px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot-on{background:#4c4;box-shadow:0 0 6px #4c4}
.dot-off{background:#666}
.btn-ico{background:none;border:none;cursor:pointer;font-size:12px;padding:4px}
.tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;display:inline-block}
.tag-mm{background:rgba(80,200,120,.13);color:#2a7}
.tag-ds{background:rgba(80,140,255,.13);color:#36c}
.sync-info{font-size:9px}
.err{font-size:10px;color:#f66}
.bar-wrap{height:5px;border-radius:3px;overflow:hidden;margin-bottom:6px}
.bar{height:100%;border-radius:3px;transition:width .5s}
.bar-label{display:-webkit-box;display:flex;-webkit-box-pack:justify;justify-content:space-between;-webkit-box-align:center;align-items:center;margin-bottom:2px;font-size:11px}
.bar-label b{font-weight:500}
.bar-label .pct{font-weight:600}
.bal-row{display:-webkit-box;display:flex;gap:6px;margin-bottom:6px}
.bal-box{-webkit-box-flex:1;flex:1;padding:7px 9px;border-radius:8px}
.bal-label{font-size:9px;margin-bottom:1px}
.bal-val{font-size:14px;font-weight:700}
.bal-val-sm{font-size:12px;font-weight:600}
.stats-row{display:-webkit-box;display:flex;gap:10px;font-size:10px}
.news-item{display:-webkit-box;display:flex;gap:8px;-webkit-box-align:center;align-items:center;padding:5px 0}
.news-rank{width:20px;height:20px;border-radius:5px;-webkit-box-flex:0;flex-shrink:0;font-size:9px;font-weight:700;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center}
.news-rank.top{color:#fff}
.news-title{font-size:12px;-webkit-box-flex:1;flex:1;line-height:1.3;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.news-node{font-size:8px;-webkit-box-flex:0;flex-shrink:0;padding:1px 3px;border-radius:2px;border:1px solid}
.news-replies{font-size:9px;-webkit-box-flex:0;flex-shrink:0;border-radius:3px;padding:1px 4px}
.bar-row{display:-webkit-box;display:flex;gap:6px;-webkit-box-pack:center;justify-content:center;padding:4px 0 6px}
.bar-btn{padding:7px 14px;border-radius:10px;border:none;cursor:pointer;font-size:11px;font-weight:600}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;z-index:100}
.modal{border-radius:18px;padding:24px 26px;width:380px;max-width:90vw;max-height:85vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.modal-hdr{display:-webkit-box;display:flex;-webkit-box-pack:justify;justify-content:space-between;-webkit-box-align:center;align-items:center;margin-bottom:16px}
.modal-title{font-size:18px;font-weight:700}
.modal-close{background:none;border:none;cursor:pointer;font-size:18px}
.field{margin-bottom:14px}
.field-label{font-size:12px;font-weight:600;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:5px;margin-bottom:6px}
.field-input{width:100%;padding:9px 10px;border-radius:8px;border:2px solid;font-size:12px;font-family:monospace;outline:none}
.field-hint{font-size:10px;margin-top:3px}
.field-hint a{font-weight:500}
.modal-footer{display:-webkit-box;display:flex;gap:6px;-webkit-box-pack:end;justify-content:flex-end;margin-top:14px}
.modal-btn{padding:8px 14px;border-radius:8px;font-size:11px;cursor:pointer;font-weight:600;border:none}
.sec-border{border:none;border-top:1px solid;margin:8px 0}
.dark .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
.dark .bar-wrap{background:rgba(255,255,255,.06)}
.dark .bal-box{background:rgba(255,255,255,.04)}
.dark .news-replies{background:rgba(255,255,255,.06)}
.dark .bar-btn{background:rgba(255,255,255,.04);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.dark .modal{background:#1a1a1a;border:1px solid rgba(255,255,255,.1)}
.dark .field-input{background:#111;border-color:#333}
.dark .sec-border{border-color:#333}
.light .card{background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.5)}
.light .bar-wrap{background:rgba(0,0,0,.06)}
.light .bal-box{background:rgba(0,0,0,.03)}
.light .news-replies{background:rgba(0,0,0,.04)}
.light .bar-btn{background:rgba(255,255,255,.6);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.light .modal{background:#fff;border:1px solid rgba(0,0,0,.08)}
.light .field-input{background:#fafafa;border-color:#e0e0e0}
.light .sec-border{border-color:#ddd}
.light .news-node{border-color:#ddd}
.dark .news-node{border-color:#333}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div id="modal-root"></div>
<script>
// в”Җв”Җ QR Code еҶ…еөҢпјҲйҒҝе…Қ CDN дҫқиө–пјүв”Җв”Җ
// з®Җжҳ“ QR з”ҹжҲҗ - дҪҝз”Ё canvas
var QRGen=(function(){
  // з®ҖеҢ–зҡ„ QR з Ғз”ҹжҲҗеҷЁ
  // еҜ№дәҺ KindleпјҢжҲ‘д»¬з”Ё Google Chart API зҡ„ fallbackпјҡжҳҫзӨәй“ҫжҺҘи®©з”ЁжҲ·жүӢеҠЁиҫ“е…Ҙ
  function generate(container,text,size){
    container.innerHTML='';
    // дҪҝз”Ё canvas ж–№ејҸ
    var img=document.createElement('img');
    img.src='https://api.qrserver.com/v1/create-qr-code/?size='+size+'x'+size+'&data='+encodeURIComponent(text);
    img.width=size;img.height=size;
    img.style.borderRadius='4px';
    img.onerror=function(){
      container.innerHTML='<div style="font-size:10px;padding:10px;text-align:center;word-break:break-all;color:#999">иҜ·жүӢеҠЁи®ҝй—®:<br><b>'+text+'</b></div>';
    };
    container.appendChild(img);
  }
  return{generate:generate};
})();

// в”Җв”Җ зҠ¶жҖҒ в”Җв”Җ
var S={
  dark:(localStorage.getItem('kd-dark')!=='false'),
  mmKey:localStorage.getItem('kd-mm')||'',
  dsKey:localStorage.getItem('kd-ds')||'',
  mm:{ok:false,sync:'--',err:null,raw:null},
  ds:{ok:false,total:'0',granted:'0',topped:'0',err:null},
  stats:JSON.parse(localStorage.getItem('kd-stats')||'null')||{date:'',calls:0,tokens:0,cost:0},
  weather:{temp:0,humidity:0,code:0,wind:0,city:'',loaded:false},
  news:[],newsLoading:false,
  syncing:false,cfgOpen:false,showPw:false
};
var pairId=null,pairPoll=null;

var FALLBACK=[
  {title:'еӨ§е®¶е№іж—¶з”Ёд»Җд№Ҳе·Ҙе…·з®ЎзҗҶеҫ…еҠһдәӢйЎ№пјҹ',replies:128,node:'еҲҶдә«еҸ‘зҺ°'},
  {title:'зЁӢеәҸе‘ҳеүҜдёҡеҒҡд»Җд№ҲжҜ”иҫғйқ и°ұ',replies:256,node:'иҒҢеңә'},
  {title:'жҺЁиҚҗдёҖдёӘе…Қиҙ№зҡ„ API жөӢиҜ•е·Ҙе…·',replies:89,node:'еҲҶдә«еҲӣйҖ '},
  {title:'Rust е’Ң Go еҲ°еә•иҜҘйҖүе“ӘдёӘпјҹ',replies:312,node:'зј–зЁӢиҜӯиЁҖ'},
  {title:'иҝңзЁӢеҠһе…¬дёӨе№ҙзҡ„дёҖдәӣеҝғеҫ—',replies:198,node:'иҒҢеңә'},
  {title:'иҮӘе»ә NAS ж–№жЎҲеҜ№жҜ”пјҡй»‘зҫӨжҷ– vs TrueNAS',replies:167,node:'зЎ¬д»¶'},
  {title:'дёәд»Җд№ҲжҲ‘д»Һ VSCode еҲҮжҚўеҲ° Neovim',replies:143,node:'зј–иҫ‘еҷЁ'},
  {title:'е°ҸеӣўйҳҹеҰӮдҪ•дҪҺжҲҗжң¬жҗӯе»ә CI/CD',replies:112,node:'ејҖеҸ‘'}
];

// в”Җв”Җ е·Ҙе…· в”Җв”Җ
function today(){return new Date().toISOString().slice(0,10);}
function pad(n){return n<10?'0'+n:''+n;}
function greet(h){return h<6?'еӨңж·ұдәҶ':h<9?'ж—©дёҠеҘҪ':h<12?'дёҠеҚҲеҘҪ':h<14?'дёӯеҚҲеҘҪ':h<18?'дёӢеҚҲеҘҪ':'жҷҡдёҠеҘҪ';}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

var WMO={0:['жҷҙ','жҷҙеӨң','вҳҖ'],1:['е°‘дә‘','е°‘дә‘','рҹҢӨ'],2:['еӨҡдә‘','еӨҡдә‘','вӣ…'],3:['йҳҙ','йҳҙ','вҳҒ'],
  45:['йӣҫ','йӣҫ','рҹҢ«'],48:['йңңйӣҫ','йңңйӣҫ','рҹҢ«'],51:['е°ҸжҜӣйӣЁ','е°ҸжҜӣйӣЁ','рҹҢҰ'],53:['жҜӣйӣЁ','жҜӣйӣЁ','рҹҢҰ'],
  55:['еҜҶжҜӣйӣЁ','еҜҶжҜӣйӣЁ','рҹҢ§'],61:['е°ҸйӣЁ','е°ҸйӣЁ','рҹҢ§'],63:['дёӯйӣЁ','дёӯйӣЁ','рҹҢ§'],65:['еӨ§йӣЁ','еӨ§йӣЁ','рҹҢ§'],
  71:['е°ҸйӣӘ','е°ҸйӣӘ','рҹҢЁ'],73:['дёӯйӣӘ','дёӯйӣӘ','рҹҢЁ'],75:['еӨ§йӣӘ','еӨ§йӣӘ','вқ„'],80:['йҳөйӣЁ','йҳөйӣЁ','рҹҢҰ'],
  81:['дёӯйҳөйӣЁ','дёӯйҳөйӣЁ','рҹҢ§'],82:['еӨ§йҳөйӣЁ','еӨ§йҳөйӣЁ','вӣҲ'],95:['йӣ·йҳөйӣЁ','йӣ·йҳөйӣЁ','вӣҲ'],
  96:['йӣ·йӣ№','йӣ·йӣ№','вӣҲ'],99:['ејәйӣ·йӣ№','ејәйӣ·йӣ№','вӣҲ']};
function wmo(c,night){var w=WMO[c]||['жңӘзҹҘ','жңӘзҹҘ','рҹҢЎ'];return{label:night?w[1]:w[0],icon:(night&&c<=2)?'вҳҪ':w[2]};}

function fmtMs(ms){
  var n=(typeof ms==='number')?ms:parseInt(ms);
  if(isNaN(n)||n<0)return'--';
  var sec=Math.floor(n/1000),d=Math.floor(sec/86400),h=Math.floor((sec%86400)/3600),m=Math.floor((sec%3600)/60);
  if(d>0)return d+'еӨ©'+h+'е°Ҹж—¶';if(h>0)return h+'е°Ҹж—¶'+m+'еҲҶй’ҹ';return m+'еҲҶй’ҹ';
}

// в”Җв”Җ XHR е°ҒиЈ…пјҲе…је®№ж—§жөҸи§ҲеҷЁпјүв”Җв”Җ
function xhr(url,opts,cb){
  if(typeof opts==='function'){cb=opts;opts={};}
  var x=new XMLHttpRequest();
  x.open(opts.method||'GET',url,true);
  if(opts.headers){for(var k in opts.headers){if(opts.headers.hasOwnProperty(k))x.setRequestHeader(k,opts.headers[k]);}}
  x.timeout=10000;
  x.onload=function(){cb(null,x);};
  x.onerror=function(){cb('error',null);};
  x.ontimeout=function(){cb('timeout',null);};
  x.send(opts.body||null);
}

// в”Җв”Җ API и°ғз”Ё в”Җв”Җ
function fetchWeather(cb){
  var lat=39.9,lon=116.4,city='';
  xhr('https://ipapi.co/json/',function(err,r){
    if(!err&&r&&r.status===200){
      try{var d=JSON.parse(r.responseText);lat=d.latitude||lat;lon=d.longitude||lon;city=d.city||'';}catch(e){}
    }
    xhr('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m',function(err2,r2){
      if(!err2&&r2&&r2.status===200){
        try{var d2=JSON.parse(r2.responseText);var c=d2.current||{};
          S.weather={temp:Math.round(c.temperature_2m||0),humidity:c.relative_humidity_2m||0,code:c.weather_code||0,wind:Math.round(c.wind_speed_10m||0),city:city,loaded:true};
        }catch(e){}
      }
      if(cb)cb();
    });
  });
}

function fetchNews(cb){
  S.newsLoading=true;render();
  xhr('https://www.v2ex.com/api/topics/hot.json',function(err,r){
    if(!err&&r&&r.status===200){
      try{var d=JSON.parse(r.responseText);
        if(Array.isArray(d)&&d.length>=3){
          S.news=[];for(var i=0;i<8&&i<d.length;i++){S.news.push({title:d[i].title,replies:d[i].replies||0,node:(d[i].node&&d[i].node.title)||''});}
        }else{S.news=FALLBACK;}
      }catch(e){S.news=FALLBACK;}
    }else{S.news=FALLBACK;}
    S.newsLoading=false;render();
    if(cb)cb();
  });
}

function track(tokens,costPer1M){
  tokens=tokens||0;costPer1M=costPer1M||4;
  var d=today();
  if(S.stats.date!==d)S.stats={date:d,calls:0,tokens:0,cost:0};
  S.stats.calls++;S.stats.tokens+=tokens;S.stats.cost+=(tokens/1000000)*costPer1M;
  localStorage.setItem('kd-stats',JSON.stringify(S.stats));
}

function syncMM(){
  if(!S.mmKey)return;S.syncing=true;render();track();
  xhr('https://api.minimaxi.com/v1/models',{headers:{'Authorization':'Bearer '+S.mmKey}},function(err,r){
    if(err||!r||r.status!==200){
      S.mm={ok:false,sync:'--',err:err?'зҪ‘з»ңејӮеёё':(r&&r.status===401?'еҜҶй’Ҙж— ж•Ҳ':'й”ҷиҜҜ '+(r?r.status:'?')),raw:null};
      S.syncing=false;render();return;
    }
    var now=new Date();S.mm.ok=true;S.mm.sync=pad(now.getHours())+':'+pad(now.getMinutes());S.mm.err=null;
    xhr('https://www.minimaxi.com/v1/token_plan/remains',{headers:{'Authorization':'Bearer '+S.mmKey,'Content-Type':'application/json'}},function(err2,r2){
      if(!err2&&r2&&r2.status===200){try{S.mm.raw=JSON.parse(r2.responseText);}catch(e){}}
      S.syncing=false;render();
    });
  });
}

function syncDS(){
  if(!S.dsKey)return;track(0,4);
  xhr('https://api.deepseek.com/user/balance',{headers:{'Authorization':'Bearer '+S.dsKey}},function(err,r){
    if(err||!r||r.status!==200){
      S.ds={ok:false,total:'0',granted:'0',topped:'0',err:err?'зҪ‘з»ңејӮеёё':(r&&r.status===401?'еҜҶй’Ҙж— ж•Ҳ':'й”ҷиҜҜ '+(r?r.status:'?'))};
      render();return;
    }
    try{var d=JSON.parse(r.responseText);var info=(d.balance_infos&&d.balance_infos[0])||{};
      S.ds={ok:d.is_available!==false,total:info.total_balance||'0',granted:info.granted_balance||'0',topped:info.topped_up_balance||'0',err:null};
    }catch(e){}
    render();
  });
}

function syncAll(){syncMM();syncDS();}

// в”Җв”Җ жёІжҹ“ в”Җв”Җ
function render(){
  var now=new Date(),H=now.getHours(),M=now.getMinutes(),Sec=now.getSeconds();
  var Y=now.getFullYear(),MO=now.getMonth()+1,D=now.getDate();
  var WD=['ж—Ҙ','дёҖ','дәҢ','дёү','еӣӣ','дә”','е…ӯ'][now.getDay()];
  var night=H>=18||H<6;
  var hue=H<6?240:H<9?30:H<12?45:H<18?200:260;
  var dk=S.dark;
  var grad=dk?'linear-gradient(160deg,hsl('+hue+',40%,10%),hsl('+(hue+30)+',30%,6%))':'linear-gradient(160deg,hsl('+hue+',25%,94%),hsl('+(hue+30)+',20%,90%))';
  var fg=dk?'#eee':'#1a1a1a',fg2=dk?'#999':'#666',fg3=dk?'#555':'#bbb';
  var acc=dk?'hsl('+hue+',70%,65%)':'hsl('+hue+',60%,45%)';
  document.body.style.background=grad;document.body.style.color=fg;
  document.body.className=dk?'dark':'light';

  var h='';
  // ж—¶й—ҙ+еӨ©ж°”
  var w=S.weather,wmoR=w.loaded?wmo(w.code,night):{label:'еҠ иҪҪдёӯ',icon:'вҸі'};
  h+='<div class="card" style="padding:16px 18px 14px"><div class="row"><div>';
  h+='<div class="greet" style="color:'+fg2+'">'+greet(H)+' В· жҳҹжңҹ'+WD+'</div>';
  h+='<div class="clock" style="color:'+fg+'">'+pad(H)+'<span class="sep" style="color:'+fg3+'">:</span>'+pad(M)+'</div>';
  h+='<div class="date" style="color:'+fg2+'">'+Y+'е№ҙ'+MO+'жңҲ'+D+'ж—Ҙ В· '+pad(Sec)+'з§’</div>';
  h+='</div><div class="wx" onclick="fetchWeather(function(){render()})">';
  h+='<div class="wx-icon">'+wmoR.icon+'</div>';
  h+='<div class="wx-temp" style="color:'+fg+'">'+(w.loaded?w.temp:'--')+'В°</div>';
  h+='<div class="wx-info" style="color:'+fg2+'">'+wmoR.label+(w.loaded?' В· ж№ҝеәҰ'+w.humidity+'%':'')+'</div>';
  if(w.loaded&&w.city)h+='<div class="wx-city" style="color:'+fg3+'">'+esc(w.city)+' В· йЈҺ'+w.wind+'km/h</div>';
  h+='</div></div></div>';

  // з”ЁйҮҸзӣ‘жҺ§
  var hasKey=S.mmKey||S.dsKey;
  if(hasKey){
    var mmOk=S.mm.ok,dsOk=S.ds.ok;
    h+='<div class="card"><div class="hdr"><div class="hdr-title">з”ЁйҮҸзӣ‘жҺ§ <span class="dot '+(mmOk||dsOk?'dot-on':'dot-off')+'"></span></div>';
    h+='<div><button class="btn-ico" style="color:'+fg2+'" onclick="openCfg()">вҡҷ</button> ';
    h+='<button class="btn-ico" style="color:'+fg2+'" onclick="syncAll()" '+(S.syncing?'disabled':'')+'>вҶ»</button></div></div>';
    if(S.mmKey){
      h+='<div style="'+(S.dsKey?'margin-bottom:10px':'')+'">';
      h+='<div style="display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:5px;margin-bottom:6px">';
      h+='<span class="tag tag-mm" style="'+(dk?'color:#5c8;background:rgba(80,200,120,.15)':'')+'">MiniMax</span>';
      if(S.mm.err)h+='<span class="err">вң— '+S.mm.err+'</span>';
      if(mmOk&&!S.mm.err)h+='<span class="sync-info" style="color:'+fg3+'">еҗҢжӯҘ '+S.mm.sync+'</span>';
      h+='</div>';
      if(mmOk&&S.mm.raw&&S.mm.raw.model_remains){
        var g=null;
        for(var mi=0;mi<S.mm.raw.model_remains.length;mi++){if(S.mm.raw.model_remains[mi].model_name==='general'){g=S.mm.raw.model_remains[mi];break;}}
        if(!g)g=S.mm.raw.model_remains[0];
        var h5=100-(g.current_interval_remaining_percent||0),wk=100-(g.current_weekly_remaining_percent||0);
        var bars=[{l:'5h йҷҗйўқ',p:h5,r:fmtMs(g.remains_time)},{l:'е‘Ёйҷҗйўқ',p:wk,r:fmtMs(g.weekly_remains_time)}];
        for(var bi=0;bi<bars.length;bi++){var b=bars[bi];
          h+='<div class="bar-label"><b style="color:'+fg+'">'+b.l+' <span style="font-size:9px;font-weight:400;color:'+fg3+'">'+b.r+'еҗҺйҮҚзҪ®</span></b><span class="pct" style="color:'+acc+'">'+Math.round(b.p)+'%</span></div>';
          h+='<div class="bar-wrap"><div class="bar" style="width:'+b.p+'%;background:'+acc+'"></div></div>';
        }
      }
      h+='</div>';
    }
    if(S.dsKey){
      h+='<div><div style="display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:5px;margin-bottom:6px">';
      h+='<span class="tag tag-ds" style="'+(dk?'color:#7af;background:rgba(80,140,255,.15)':'')+'">DeepSeek</span>';
      if(S.ds.err)h+='<span class="err">вң— '+S.ds.err+'</span>';
      h+='</div>';
      if(S.ds.ok){
        h+='<div class="bal-row">';
        h+='<div class="bal-box"><div class="bal-label" style="color:'+fg3+'">жҖ»дҪҷйўқ</div><div class="bal-val" style="color:'+fg+'">ВҘ'+parseFloat(S.ds.total).toFixed(2)+'</div></div>';
        h+='<div class="bal-box"><div class="bal-label" style="color:'+fg3+'">иө йҖҒ</div><div class="bal-val-sm" style="color:'+(dk?'#7af':'#36c')+'">ВҘ'+parseFloat(S.ds.granted).toFixed(2)+'</div></div>';
        h+='<div class="bal-box"><div class="bal-label" style="color:'+fg3+'">е……еҖј</div><div class="bal-val-sm" style="color:'+fg2+'">ВҘ'+parseFloat(S.ds.topped).toFixed(2)+'</div></div>';
        h+='</div>';
        var st=S.stats.date===today()?S.stats:{calls:0,tokens:0,cost:0};
        h+='<div class="stats-row" style="color:'+fg2+'"><span>д»Ҡж—Ҙ <b style="color:'+fg+'">'+st.calls+'</b> ж¬Ўи°ғз”Ё</span>';
        if(st.tokens>0){h+='<span>Token <b style="color:'+fg+'">'+(st.tokens>1000?(st.tokens/1000).toFixed(1)+'k':st.tokens)+'</b></span><span>йў„дј° <b style="color:'+(dk?'#7af':'#36c')+'">ВҘ'+st.cost.toFixed(4)+'</b></span>';}
        else{h+='<span style="font-size:9px;color:'+fg3+'">AIи°ғз”Ёе°ҶиҮӘеҠЁз»ҹи®ЎToken</span>';}
        h+='</div>';
      }
      h+='</div>';
    }
    h+='</div>';
  }

  // жҠҖжңҜзғӯжҰң
  var news=S.news.length?S.news:FALLBACK;
  h+='<div class="card"><div class="hdr"><div class="hdr-title">жҠҖжңҜзғӯжҰң <span style="font-size:10px;font-weight:400;color:'+fg2+'">V2EX</span></div>';
  h+='<button class="btn-ico" style="color:'+fg2+';width:26px;height:26px;border-radius:6px;background:'+(dk?'rgba(255,255,255,.08)':'rgba(0,0,0,.05)')+';font-size:13px" onclick="fetchNews()" '+(S.newsLoading?'disabled':'')+'>вҶ»</button></div>';
  for(var ni=0;ni<news.length;ni++){var n=news[ni];
    var top=ni<3;
    h+='<div class="news-item">';
    h+='<span class="news-rank'+(top?' top':'')+'" style="background:'+(top?acc:(dk?'rgba(255,255,255,.06)':'rgba(0,0,0,.04)'))+';color:'+(top?'#fff':fg2)+'">'+(ni+1)+'</span>';
    h+='<span class="news-title" style="color:'+fg+'">'+esc(n.title)+'</span>';
    if(n.node)h+='<span class="news-node" style="color:'+fg3+'">'+esc(n.node)+'</span>';
    h+='<span class="news-replies" style="color:'+fg2+'">'+n.replies+'еӣһеӨҚ</span>';
    h+='</div>';
  }
  h+='</div>';

  // еә•йғЁж Ҹ
  h+='<div class="bar-row">';
  h+='<button class="bar-btn" style="color:'+fg+'" onclick="toggleDark()">'+(dk?'вҳҖ ж—Ҙй—ҙ':'вҳҫ еӨңй—ҙ')+'</button>';
  h+='<button class="bar-btn" style="color:'+fg+'" onclick="fetchNews()">вҶ» еҲ·ж–°</button>';
  h+='<button class="bar-btn" style="color:'+fg+'" onclick="openCfg()">вҡҷ и®ҫзҪ®</button>';
  h+='</div>';

  document.getElementById('app').innerHTML=h;
  renderModal();
}

function renderModal(){
  if(!S.cfgOpen){document.getElementById('modal-root').innerHTML='';return;}
  var dk=S.dark,fg=dk?'#eee':'#1a1a1a',fg2=dk?'#999':'#666',fg3=dk?'#555':'#bbb';
  var acc=dk?'hsl(200,70%,65%)':'hsl(200,60%,45%)';
  var mmVal='',dsVal='';
  var mmEl=document.getElementById('mm-input'),dsEl=document.getElementById('ds-input');
  if(mmEl)mmVal=mmEl.value;if(dsEl)dsVal=dsEl.value;
  if(!mmVal)mmVal=S.mmKey;if(!dsVal)dsVal=S.dsKey;

  var h='<div class="overlay" onclick="if(event.target===this)closeCfg()"><div class="modal">';
  h+='<div class="modal-hdr"><span class="modal-title" style="color:'+fg+'">API еҜҶй’Ҙи®ҫзҪ®</span>';
  h+='<button class="modal-close" style="color:'+fg2+'" onclick="closeCfg()">вң•</button></div>';
  h+='<div class="field"><label class="field-label" style="color:'+fg2+'"><span class="tag tag-mm" style="'+(dk?'color:#5c8;background:rgba(80,200,120,.15)':'')+'">MiniMax</span> Token Plan еҜҶй’Ҙ</label>';
  h+='<input class="field-input" type="'+(S.showPw?'text':'password')+'" id="mm-input" value="'+esc(mmVal)+'" placeholder="иҫ“е…Ҙ MiniMax еҜҶй’Ҙ...">';
  h+='<div class="field-hint" style="color:'+fg3+'">MiniMax жҺ§еҲ¶еҸ° вҶ’ Token Plan</div></div>';
  h+='<div class="field"><label class="field-label" style="color:'+fg2+'"><span class="tag tag-ds" style="'+(dk?'color:#7af;background:rgba(80,140,255,.15)':'')+'">DeepSeek</span> API еҜҶй’Ҙ</label>';
  h+='<input class="field-input" type="'+(S.showPw?'text':'password')+'" id="ds-input" value="'+esc(dsVal)+'" placeholder="иҫ“е…Ҙ DeepSeek еҜҶй’Ҙ...">';
  h+='<div class="field-hint" style="color:'+fg3+'">DeepSeek ејҖж”ҫе№іеҸ° вҶ’ API Keys</div></div>';
  h+='<div style="font-size:10px;color:'+fg3+';margin-bottom:12px">еҜҶй’Ҙд»…еӯҳеӮЁеңЁжөҸи§ҲеҷЁжң¬ең°</div>';
  h+='<hr class="sec-border">';
  h+='<div style="text-align:center;margin-bottom:12px">';
  h+='<div style="font-size:12px;font-weight:600;color:'+fg2+';margin-bottom:8px">жүӢжңәжү«з Ғиҫ“е…ҘеҜҶй’Ҙ</div>';
  h+='<div style="display:-webkit-box;display:flex;-webkit-box-pack:center;justify-content:center;-webkit-box-align:center;align-items:center;gap:16px">';
  h+='<div id="qr-box" style="border-radius:8px;overflow:hidden;padding:6px;background:'+(dk?'#222':'#fff')+'"></div>';
  h+='<div style="text-align:left">';
  h+='<div style="font-size:10px;color:'+fg3+';margin-bottom:4px">й…ҚеҜ№з Ғ</div>';
  h+='<div id="pair-code" style="font-size:22px;font-weight:800;letter-spacing:3px;color:'+fg+';font-family:monospace">------</div>';
  h+='<div style="font-size:10px;color:'+fg3+';margin-top:6px;line-height:1.6">жүӢжңәжү«з ҒеҗҺ<br>еңЁжүӢжңәдёҠиҫ“е…ҘеҜҶй’Ҙ<br>Kindle иҮӘеҠЁжҺҘж”¶</div>';
  h+='<button onclick="showPairQR()" style="margin-top:8px;padding:5px 12px;border-radius:6px;border:1px solid '+(dk?'#444':'#ddd')+';background:transparent;color:'+fg2+';font-size:11px;cursor:pointer">'+(pairId?'йҮҚж–°з”ҹжҲҗ':'з”ҹжҲҗдәҢз»ҙз Ғ')+'</button>';
  h+='</div></div></div>';
  h+='<div class="modal-footer">';
  if(S.mmKey||S.dsKey)h+='<button class="modal-btn" style="border:1px solid #e44;background:transparent;color:#e44" onclick="clearAll()">е…ЁйғЁжё…йҷӨ</button>';
  h+='<button class="modal-btn" style="border:1px solid '+(dk?'#333':'#ddd')+';background:transparent;color:'+fg+'" onclick="closeCfg()">еҸ–ж¶Ҳ</button>';
  h+='<button class="modal-btn" style="background:'+acc+';color:#fff" onclick="saveKeys()">дҝқеӯҳе№¶йӘҢиҜҒ</button>';
  h+='</div></div></div>';
  document.getElementById('modal-root').innerHTML=h;
  showPairQR();
}

// в”Җв”Җ дәӨдә’ в”Җв”Җ
function toggleDark(){S.dark=!S.dark;localStorage.setItem('kd-dark',S.dark);render();}
function openCfg(){S.cfgOpen=true;renderModal();}
function closeCfg(){S.cfgOpen=false;if(pairPoll){clearInterval(pairPoll);pairPoll=null;pairId=null;}renderModal();}
function saveKeys(){
  var mmEl=document.getElementById('mm-input'),dsEl=document.getElementById('ds-input');
  var mm=mmEl?(mmEl.value.replace(/^\s+|\s+$/g,'')):'',ds=dsEl?(dsEl.value.replace(/^\s+|\s+$/g,'')):'';
  if(mm){S.mmKey=mm;localStorage.setItem('kd-mm',mm);}
  if(ds){S.dsKey=ds;localStorage.setItem('kd-ds',ds);}
  S.cfgOpen=false;render();syncAll();
}
function clearAll(){
  S.mmKey='';S.dsKey='';S.mm={ok:false,sync:'--',err:null,raw:null};S.ds={ok:false,total:'0',granted:'0',topped:'0',err:null};
  localStorage.removeItem('kd-mm');localStorage.removeItem('kd-ds');
  S.cfgOpen=false;render();
}

function getPageUrl(){return location.href.split('?')[0];}

function showPairQR(){
  var qrDiv=document.getElementById('qr-box');
  var codeEl=document.getElementById('pair-code');
  if(!qrDiv)return;
  qrDiv.innerHTML='<div style="font-size:11px;padding:40px 10px;text-align:center;color:#999">з”ҹжҲҗдёӯ...</div>';
  var blobId=Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4);
  pairId=blobId;
  // е°қиҜ•еҲӣе»ә jsonblob
  xhr('https://jsonblob.com/api/jsonBlob',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:'{}'},function(err,r){
    if(!err&&r&&r.status>=200&&r.status<300){
      var loc=r.getResponseHeader('Location')||'';
      var realId=loc.split('/').pop();
      if(realId&&realId.length>2)pairId=realId;
    }
    var finalUrl=getPageUrl()+'?pair='+pairId;
    qrDiv.innerHTML='';
    QRGen.generate(qrDiv,finalUrl,140);
    var short=pairId.slice(-6).toUpperCase();
    if(codeEl)codeEl.textContent=short;
    if(pairPoll)clearInterval(pairPoll);
    pairPoll=setInterval(pollPair,3000);
  });
}

function pollPair(){
  if(!pairId)return;
  xhr('https://jsonblob.com/api/jsonBlob/'+pairId,function(err,r){
    if(err||!r||r.status!==200)return;
    try{var d=JSON.parse(r.responseText);
      if(d.mm){S.mmKey=d.mm;localStorage.setItem('kd-mm',d.mm);}
      if(d.ds){S.dsKey=d.ds;localStorage.setItem('kd-ds',d.ds);}
      if(d.mm||d.ds){clearInterval(pairPoll);pairPoll=null;pairId=null;S.cfgOpen=false;render();syncAll();}
    }catch(e){}
  });
}

// в”Җв”Җ жүӢжңәз«Ҝиҫ“е…ҘжЁЎејҸ в”Җв”Җ
function checkPairMode(){
  var search=location.search||'';
  var match=search.match(/[?&]pair=([^&]+)/);
  if(!match)return false;
  var pid=decodeURIComponent(match[1]);
  document.body.innerHTML='<div style="max-width:400px;margin:40px auto;padding:20px;font-family:-apple-system,sans-serif">'
    +'<h2 style="margin-bottom:6px">рҹ“ұ жү«з Ғиҫ“е…ҘеҜҶй’Ҙ</h2>'
    +'<p style="color:#666;font-size:13px;margin-bottom:24px">еңЁжӯӨиҫ“е…Ҙ API еҜҶй’ҘпјҢKindle е°ҶиҮӘеҠЁжҺҘж”¶</p>'
    +'<div style="margin-bottom:16px"><label style="font-size:12px;font-weight:600;display:block;margin-bottom:6px;color:#555">'
    +'<span style="padding:1px 6px;border-radius:4px;background:rgba(80,200,120,.12);font-size:11px;font-weight:700;color:#2a7;margin-right:4px">MiniMax</span>еҜҶй’Ҙ</label>'
    +'<input id="m-mm" type="text" placeholder="иҫ“е…Ҙ MiniMax еҜҶй’ҘпјҲеҸҜз•ҷз©әпјү" style="width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px;font-family:monospace;outline:none"></div>'
    +'<div style="margin-bottom:20px"><label style="font-size:12px;font-weight:600;display:block;margin-bottom:6px;color:#555">'
    +'<span style="padding:1px 6px;border-radius:4px;background:rgba(80,140,255,.12);font-size:11px;font-weight:700;color:#36c;margin-right:4px">DeepSeek</span>еҜҶй’Ҙ</label>'
    +'<input id="m-ds" type="text" placeholder="иҫ“е…Ҙ DeepSeek еҜҶй’ҘпјҲеҸҜз•ҷз©әпјү" style="width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px;font-family:monospace;outline:none"></div>'
    +'<button id="m-send" onclick="sendKeys(\''+pid+'\')" style="width:100%;padding:14px;border-radius:12px;border:none;background:#2563eb;color:#fff;font-size:15px;font-weight:700;cursor:pointer">еҸ‘йҖҒеҲ° Kindle</button>'
    +'<div id="m-status" style="margin-top:16px;text-align:center;font-size:13px;color:#666"></div></div>';
  return true;
}

function sendKeys(pid){
  var mmEl=document.getElementById('m-mm'),dsEl=document.getElementById('m-ds');
  var mm=mmEl?(mmEl.value.replace(/^\s+|\s+$/g,'')):'',ds=dsEl?(dsEl.value.replace(/^\s+|\s+$/g,'')):'';
  if(!mm&&!ds){document.getElementById('m-status').innerHTML='<span style="color:#f66">иҜ·иҮіе°‘иҫ“е…ҘдёҖдёӘеҜҶй’Ҙ</span>';return;}
  var btn=document.getElementById('m-send');btn.disabled=true;btn.textContent='еҸ‘йҖҒдёӯ...';
  xhr('https://jsonblob.com/api/jsonBlob/'+pid,{method:'PUT',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({mm:mm,ds:ds})},function(err,r){
    if(!err&&r&&r.status>=200&&r.status<300){
      document.getElementById('m-status').innerHTML='<span style="color:#2a7;font-size:16px;font-weight:700">вң“ еҸ‘йҖҒжҲҗеҠҹпјҒ</span><br><span style="font-size:12px">Kindle е°ҶеңЁеҮ з§’еҶ…иҮӘеҠЁжҺҘж”¶</span>';
    }else{
      document.getElementById('m-status').innerHTML='<span style="color:#f66">еҸ‘йҖҒеӨұиҙҘпјҢиҜ·йҮҚиҜ•</span>';btn.disabled=false;btn.textContent='еҸ‘йҖҒеҲ° Kindle';
    }
  });
}

// в”Җв”Җ еҲқе§ӢеҢ– в”Җв”Җ
if(!checkPairMode()){
  render();
  fetchWeather(function(){render();});
  fetchNews();
  if(S.mmKey)syncMM();
  if(S.dsKey)syncDS();
  setInterval(function(){render();},1000);
  setInterval(function(){if(S.mmKey)syncMM();if(S.dsKey)syncDS();},5*60*1000);
}
</script>
