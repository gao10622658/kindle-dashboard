<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>信息屏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue',system-ui,sans-serif;background:#fff;color:#000;min-height:100vh;overflow-x:hidden}
.wrap{max-width:380px;margin:0 auto;padding:12px 14px}
.card{border:2px solid #000;border-radius:8px;padding:12px 14px;margin-bottom:10px;background:#fff}
.row{display:-webkit-box;display:flex;-webkit-box-pack:justify;justify-content:space-between;-webkit-box-align:start;align-items:flex-start}
.greet{font-size:14px;font-weight:700;margin-bottom:2px;color:#000}
.clock{font-size:52px;font-weight:900;letter-spacing:-2px;line-height:.85;color:#000}
.clock .sep{font-weight:300}
.date{font-size:13px;margin-top:4px;color:#000}
.wx{text-align:right}
.wx-icon{font-size:36px;font-weight:200;line-height:1}
.wx-temp{font-size:28px;font-weight:900;line-height:1;margin-top:2px;color:#000}
.wx-info{font-size:11px;margin-top:3px;color:#000}
.wx-city{font-size:10px;margin-top:2px;color:#333}
.hdr{display:-webkit-box;display:flex;-webkit-box-pack:justify;justify-content:space-between;-webkit-box-align:center;align-items:center;margin-bottom:8px}
.hdr-title{font-size:15px;font-weight:800;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center}
.hdr-title .dot{margin-right:6px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;border:2px solid #000}
.dot-on{background:#000}
.dot-off{background:#fff}
.btn-ico{background:#fff;border:2px solid #000;border-radius:6px;cursor:pointer;font-size:13px;padding:4px 8px;font-weight:700}
.tag{font-size:11px;font-weight:800;padding:2px 6px;border-radius:4px;display:inline-block;border:2px solid #000;background:#fff}
.tag-mm{background:#000;color:#fff}
.tag-ds{background:#000;color:#fff}
.sync-info{font-size:10px;color:#333}
.err{font-size:11px;color:#000;font-weight:700}
.bar-wrap{height:8px;border-radius:4px;overflow:hidden;margin-bottom:6px;border:1px solid #000;background:#fff}
.bar{height:100%;background:#000}
.bar-label{display:-webkit-box;display:flex;-webkit-box-pack:justify;justify-content:space-between;-webkit-box-align:center;align-items:center;margin-bottom:2px;font-size:12px}
.bar-label b{font-weight:700}
.bar-label .pct{font-weight:900}
.bal-row{display:-webkit-box;display:flex;gap:6px;margin-bottom:6px}
.bal-box{-webkit-box-flex:1;flex:1;padding:8px 10px;border-radius:6px;border:2px solid #000;background:#fff}
.bal-label{font-size:10px;margin-bottom:1px;color:#333}
.bal-val{font-size:16px;font-weight:900;color:#000}
.bal-val-sm{font-size:13px;font-weight:700;color:#000}
.stats-row{display:-webkit-box;display:flex;gap:10px;font-size:11px;color:#000}
.news-item{display:-webkit-box;display:flex;gap:8px;-webkit-box-align:center;align-items:center;padding:6px 0;border-bottom:1px solid #ccc}
.news-item:last-child{border-bottom:none}
.news-rank{width:22px;height:22px;border-radius:4px;-webkit-box-flex:0;flex-shrink:0;font-size:10px;font-weight:900;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;border:2px solid #000;background:#fff;color:#000}
.news-rank.top{background:#000;color:#fff}
.news-title{font-size:13px;-webkit-box-flex:1;flex:1;line-height:1.3;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#000}
.news-node{font-size:9px;-webkit-box-flex:0;flex-shrink:0;padding:1px 4px;border-radius:2px;border:1px solid #000;color:#333}
.news-replies{font-size:10px;-webkit-box-flex:0;flex-shrink:0;color:#333}
.bar-row{display:-webkit-box;display:flex;gap:8px;-webkit-box-pack:center;justify-content:center;padding:8px 0 6px}
.bar-btn{padding:8px 16px;border-radius:8px;border:2px solid #000;cursor:pointer;font-size:12px;font-weight:700;background:#fff;color:#000}
.bar-btn:active{background:#000;color:#fff}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;z-index:100}
.modal{background:#fff;border:3px solid #000;border-radius:12px;padding:20px 22px;width:360px;max-width:92vw;max-height:85vh;overflow-y:auto}
.modal-hdr{display:-webkit-box;display:flex;-webkit-box-pack:justify;justify-content:space-between;-webkit-box-align:center;align-items:center;margin-bottom:14px}
.modal-title{font-size:18px;font-weight:900;color:#000}
.modal-close{background:#fff;border:2px solid #000;border-radius:6px;cursor:pointer;font-size:16px;padding:2px 8px;font-weight:700}
.field{margin-bottom:14px}
.field-label{font-size:13px;font-weight:700;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;margin-bottom:6px;color:#000}
.field-input{width:100%;padding:10px;border-radius:6px;border:2px solid #000;font-size:13px;font-family:monospace;outline:none;background:#fff}
.field-hint{font-size:11px;margin-top:3px;color:#333}
.modal-footer{display:-webkit-box;display:flex;gap:6px;-webkit-box-pack:end;justify-content:flex-end;margin-top:14px}
.modal-btn{padding:8px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:700;border:2px solid #000;background:#fff;color:#000}
.modal-btn-primary{background:#000;color:#fff}
.modal-btn-danger{color:#000;border-color:#000}
.sec-border{border:none;border-top:2px solid #000;margin:10px 0}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div id="modal-root"></div>
<script>
// ── QR 生成（在线 API）──
var QRGen={
  generate:function(container,text,size){
    container.innerHTML='';
    var img=document.createElement('img');
    img.src='https://api.qrserver.com/v1/create-qr-code/?size='+size+'x'+size+'&data='+encodeURIComponent(text)+'&color=000000&bgcolor=ffffff';
    img.width=size;img.height=size;
    img.onerror=function(){
      container.innerHTML='<div style="font-size:11px;padding:8px;text-align:center;word-break:break-all;color:#000;border:1px solid #000">手动访问:<br><b style="font-size:10px">'+text+'</b></div>';
    };
    container.appendChild(img);
  }
};

// ── 状态 ──
var S={
  dark:false,
  mmKey:localStorage.getItem('kd-mm')||'',
  dsKey:localStorage.getItem('kd-ds')||'',
  mm:{ok:false,sync:'--',err:null,raw:null},
  ds:{ok:false,total:'0',granted:'0',topped:'0',err:null},
  stats:JSON.parse(localStorage.getItem('kd-stats')||'null')||{date:'',calls:0,tokens:0,cost:0},
  weather:{temp:0,humidity:0,code:0,wind:0,city:'',loaded:false},
  news:[],newsLoading:false,
  syncing:false,cfgOpen:false
};
var pairId=null,pairPoll=null;

var FALLBACK=[
  {title:'大家平时用什么工具管理待办事项？',replies:128,node:'分享发现'},
  {title:'程序员副业做什么比较靠谱',replies:256,node:'职场'},
  {title:'推荐一个免费的 API 测试工具',replies:89,node:'分享创造'},
  {title:'Rust 和 Go 到底该选哪个？',replies:312,node:'编程语言'},
  {title:'远程办公两年的一些心得',replies:198,node:'职场'},
  {title:'自建 NAS 方案对比',replies:167,node:'硬件'},
  {title:'为什么我从 VSCode 切换到 Neovim',replies:143,node:'编辑器'},
  {title:'小团队如何低成本搭建 CI/CD',replies:112,node:'开发'}
];

function today(){return new Date().toISOString().slice(0,10);}
function pad(n){return n<10?'0'+n:''+n;}
function greet(h){return h<6?'夜深了':h<9?'早上好':h<12?'上午好':h<14?'中午好':h<18?'下午好':'晚上好';}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

var WMO={0:['晴','晴夜','☀'],1:['少云','少云','☁'],2:['多云','多云','☁'],3:['阴','阴','☁'],
  45:['雾','雾','≡'],48:['霜雾','霜雾','≡'],51:['小雨','小雨','~'],53:['雨','雨','~'],
  55:['大雨','大雨','~'],61:['小雨','小雨','~'],63:['中雨','中雨','~'],65:['大雨','大雨','~'],
  71:['小雪','小雪','*'],73:['中雪','中雪','*'],75:['大雪','大雪','*'],80:['阵雨','阵雨','~'],
  81:['中阵雨','中阵雨','~'],82:['大阵雨','大阵雨','~'],95:['雷阵雨','雷阵雨','!'],
  96:['雷雹','雷雹','!'],99:['强雷雹','强雷雹','!']};
function wmo(c,night){var w=WMO[c]||['未知','未知','?'];return{label:night?w[1]:w[0],icon:w[2]};}

function fmtMs(ms){
  var n=(typeof ms==='number')?ms:parseInt(ms);
  if(isNaN(n)||n<0)return'--';
  var sec=Math.floor(n/1000),d=Math.floor(sec/86400),h=Math.floor((sec%86400)/3600),m=Math.floor((sec%3600)/60);
  if(d>0)return d+'天'+h+'时';if(h>0)return h+'时'+m+'分';return m+'分';
}

function xhr(url,opts,cb){
  if(typeof opts==='function'){cb=opts;opts={};}
  var x=new XMLHttpRequest();
  x.open(opts.method||'GET',url,true);
  if(opts.headers){for(var k in opts.headers){if(opts.headers.hasOwnProperty(k))x.setRequestHeader(k,opts.headers[k]);}}
  x.timeout=10000;
  x.onload=function(){cb(null,x);};
  x.onerror=function(){cb('error',null);};
  x.ontimeout=function(){cb('timeout',null);};
  x.send(opts.body||null);
}

function fetchWeather(cb){
  var lat=39.9,lon=116.4,city='';
  xhr('https://ipapi.co/json/',function(err,r){
    if(!err&&r&&r.status===200){
      try{var d=JSON.parse(r.responseText);lat=d.latitude||lat;lon=d.longitude||lon;city=d.city||'';}catch(e){}
    }
    xhr('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m',function(err2,r2){
      if(!err2&&r2&&r2.status===200){
        try{var d2=JSON.parse(r2.responseText);var c=d2.current||{};
          S.weather={temp:Math.round(c.temperature_2m||0),humidity:c.relative_humidity_2m||0,code:c.weather_code||0,wind:Math.round(c.wind_speed_10m||0),city:city,loaded:true};
        }catch(e){}
      }
      if(cb)cb();
    });
  });
}

function fetchNews(cb){
  S.newsLoading=true;render();
  xhr('https://www.v2ex.com/api/topics/hot.json',function(err,r){
    if(!err&&r&&r.status===200){
      try{var d=JSON.parse(r.responseText);
        if(Array.isArray(d)&&d.length>=3){
          S.news=[];for(var i=0;i<8&&i<d.length;i++){S.news.push({title:d[i].title,replies:d[i].replies||0,node:(d[i].node&&d[i].node.title)||''});}
        }else{S.news=FALLBACK;}
      }catch(e){S.news=FALLBACK;}
    }else{S.news=FALLBACK;}
    S.newsLoading=false;render();
    if(cb)cb();
  });
}

function track(tokens,costPer1M){
  tokens=tokens||0;costPer1M=costPer1M||4;
  var d=today();
  if(S.stats.date!==d)S.stats={date:d,calls:0,tokens:0,cost:0};
  S.stats.calls++;S.stats.tokens+=tokens;S.stats.cost+=(tokens/1000000)*costPer1M;
  localStorage.setItem('kd-stats',JSON.stringify(S.stats));
}

function syncMM(){
  if(!S.mmKey)return;S.syncing=true;render();track();
  xhr('https://api.minimaxi.com/v1/models',{headers:{'Authorization':'Bearer '+S.mmKey}},function(err,r){
    if(err||!r||r.status!==200){
      S.mm={ok:false,sync:'--',err:err?'网络异常':(r&&r.status===401?'密钥无效':'错误 '+(r?r.status:'?')),raw:null};
      S.syncing=false;render();return;
    }
    var now=new Date();S.mm.ok=true;S.mm.sync=pad(now.getHours())+':'+pad(now.getMinutes());S.mm.err=null;
    xhr('https://www.minimaxi.com/v1/token_plan/remains',{headers:{'Authorization':'Bearer '+S.mmKey,'Content-Type':'application/json'}},function(err2,r2){
      if(!err2&&r2&&r2.status===200){try{S.mm.raw=JSON.parse(r2.responseText);}catch(e){}}
      S.syncing=false;render();
    });
  });
}

function syncDS(){
  if(!S.dsKey)return;track(0,4);
  xhr('https://api.deepseek.com/user/balance',{headers:{'Authorization':'Bearer '+S.dsKey}},function(err,r){
    if(err||!r||r.status!==200){
      S.ds={ok:false,total:'0',granted:'0',topped:'0',err:err?'网络异常':(r&&r.status===401?'密钥无效':'错误 '+(r?r.status:'?'))};
      render();return;
    }
    try{var d=JSON.parse(r.responseText);var info=(d.balance_infos&&d.balance_infos[0])||{};
      S.ds={ok:d.is_available!==false,total:info.total_balance||'0',granted:info.granted_balance||'0',topped:info.topped_up_balance||'0',err:null};
    }catch(e){}
    render();
  });
}

function syncAll(){syncMM();syncDS();}

function render(){
  var now=new Date(),H=now.getHours(),M=now.getMinutes(),Sec=now.getSeconds();
  var Y=now.getFullYear(),MO=now.getMonth()+1,D=now.getDate();
  var WD=['日','一','二','三','四','五','六'][now.getDay()];
  var night=H>=18||H<6;

  var h='';
  // 时间+天气
  var w=S.weather,wmoR=w.loaded?wmo(w.code,night):{label:'...',icon:'?'};
  h+='<div class="card"><div class="row"><div>';
  h+='<div class="greet">'+greet(H)+' · 星期'+WD+'</div>';
  h+='<div class="clock">'+pad(H)+'<span class="sep">:</span>'+pad(M)+'</div>';
  h+='<div class="date">'+Y+'年'+MO+'月'+D+'日 · '+pad(Sec)+'秒</div>';
  h+='</div><div class="wx" onclick="fetchWeather(function(){render()})">';
  h+='<div class="wx-icon">'+wmoR.icon+'</div>';
  h+='<div class="wx-temp">'+(w.loaded?w.temp:'--')+'°</div>';
  h+='<div class="wx-info">'+wmoR.label+(w.loaded?' · 湿度'+w.humidity+'%':'')+'</div>';
  if(w.loaded&&w.city)h+='<div class="wx-city">'+esc(w.city)+' · 风'+w.wind+'</div>';
  h+='</div></div></div>';

  // 用量监控
  var hasKey=S.mmKey||S.dsKey;
  if(hasKey){
    var mmOk=S.mm.ok,dsOk=S.ds.ok;
    h+='<div class="card"><div class="hdr"><div class="hdr-title"><span class="dot '+(mmOk||dsOk?'dot-on':'dot-off')+'"></span> 用量监控</div>';
    h+='<div><button class="btn-ico" onclick="openCfg()">⚙</button> ';
    h+='<button class="btn-ico" onclick="syncAll()" '+(S.syncing?'disabled':'')+'>↻</button></div></div>';
    if(S.mmKey){
      h+='<div style="'+(S.dsKey?'margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #ccc':'')+'">';
      h+='<div style="display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;margin-bottom:6px">';
      h+='<span class="tag tag-mm">MM</span>';
      if(S.mm.err)h+=' <span class="err">✗ '+S.mm.err+'</span>';
      if(mmOk&&!S.mm.err)h+=' <span class="sync-info">'+S.mm.sync+'</span>';
      h+='</div>';
      if(mmOk&&S.mm.raw&&S.mm.raw.model_remains){
        var g=null;
        for(var mi=0;mi<S.mm.raw.model_remains.length;mi++){if(S.mm.raw.model_remains[mi].model_name==='general'){g=S.mm.raw.model_remains[mi];break;}}
        if(!g)g=S.mm.raw.model_remains[0];
        var h5=100-(g.current_interval_remaining_percent||0),wk=100-(g.current_weekly_remaining_percent||0);
        var bars=[{l:'5h 限额',p:h5,r:fmtMs(g.remains_time)},{l:'周限额',p:wk,r:fmtMs(g.weekly_remains_time)}];
        for(var bi=0;bi<bars.length;bi++){var b=bars[bi];
          h+='<div class="bar-label"><b>'+b.l+' <span style="font-size:10px;font-weight:400;color:#333">'+b.r+'后重置</span></b><span class="pct">'+Math.round(b.p)+'%</span></div>';
          h+='<div class="bar-wrap"><div class="bar" style="width:'+b.p+'%"></div></div>';
        }
      }
      h+='</div>';
    }
    if(S.dsKey){
      h+='<div><div style="display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;margin-bottom:6px">';
      h+='<span class="tag tag-ds">DS</span>';
      if(S.ds.err)h+=' <span class="err">✗ '+S.ds.err+'</span>';
      h+='</div>';
      if(S.ds.ok){
        h+='<div class="bal-row">';
        h+='<div class="bal-box"><div class="bal-label">总余额</div><div class="bal-val">'+parseFloat(S.ds.total).toFixed(2)+'</div></div>';
        h+='<div class="bal-box"><div class="bal-label">赠送</div><div class="bal-val-sm">'+parseFloat(S.ds.granted).toFixed(2)+'</div></div>';
        h+='<div class="bal-box"><div class="bal-label">充值</div><div class="bal-val-sm">'+parseFloat(S.ds.topped).toFixed(2)+'</div></div>';
        h+='</div>';
        var st=S.stats.date===today()?S.stats:{calls:0,tokens:0,cost:0};
        h+='<div class="stats-row"><span>今日 <b>'+st.calls+'</b> 次</span>';
        if(st.tokens>0){h+='<span>Token <b>'+(st.tokens>1000?(st.tokens/1000).toFixed(1)+'k':st.tokens)+'</b></span><span>¥'+st.cost.toFixed(4)+'</span>';}
        else{h+='<span style="font-size:10px;color:#333">AI调用自动统计</span>';}
        h+='</div>';
      }
      h+='</div>';
    }
    h+='</div>';
  }

  // 技术热榜
  var news=S.news.length?S.news:FALLBACK;
  h+='<div class="card"><div class="hdr"><div class="hdr-title">技术热榜 <span style="font-size:11px;font-weight:400;color:#333;margin-left:6px">V2EX</span></div>';
  h+='<button class="btn-ico" onclick="fetchNews()" '+(S.newsLoading?'disabled':'')+'>↻</button></div>';
  for(var ni=0;ni<news.length;ni++){var n=news[ni];
    var top=ni<3;
    h+='<div class="news-item">';
    h+='<span class="news-rank'+(top?' top':'')+'">'+(ni+1)+'</span>';
    h+='<span class="news-title">'+esc(n.title)+'</span>';
    if(n.node)h+='<span class="news-node">'+esc(n.node)+'</span>';
    h+='<span class="news-replies">'+n.replies+'</span>';
    h+='</div>';
  }
  h+='</div>';

  // 底部栏
  h+='<div class="bar-row">';
  h+='<button class="bar-btn" onclick="fetchNews()">↻ 刷新</button>';
  h+='<button class="bar-btn" onclick="openCfg()">⚙ 设置</button>';
  h+='</div>';

  document.getElementById('app').innerHTML=h;
  renderModal();
}

function renderModal(){
  if(!S.cfgOpen){document.getElementById('modal-root').innerHTML='';return;}
  var mmVal='',dsVal='';
  var mmEl=document.getElementById('mm-input'),dsEl=document.getElementById('ds-input');
  if(mmEl)mmVal=mmEl.value;if(dsEl)dsVal=dsEl.value;
  if(!mmVal)mmVal=S.mmKey;if(!dsVal)dsVal=S.dsKey;

  var h='<div class="overlay" onclick="if(event.target===this)closeCfg()"><div class="modal">';
  h+='<div class="modal-hdr"><span class="modal-title">API 密钥设置</span>';
  h+='<button class="modal-close" onclick="closeCfg()">✕</button></div>';
  h+='<div class="field"><label class="field-label"><span class="tag tag-mm" style="margin-right:5px">MM</span> Token Plan 密钥</label>';
  h+='<input class="field-input" type="password" id="mm-input" value="'+esc(mmVal)+'" placeholder="输入 MiniMax 密钥...">';
  h+='<div class="field-hint">MiniMax 控制台 → Token Plan</div></div>';
  h+='<div class="field"><label class="field-label"><span class="tag tag-ds" style="margin-right:5px">DS</span> API 密钥</label>';
  h+='<input class="field-input" type="password" id="ds-input" value="'+esc(dsVal)+'" placeholder="输入 DeepSeek 密钥...">';
  h+='<div class="field-hint">DeepSeek 开放平台 → API Keys</div></div>';
  h+='<div style="font-size:11px;color:#333;margin-bottom:10px">密钥仅存储在浏览器本地</div>';
  h+='<hr class="sec-border">';
  h+='<div style="text-align:center;margin-bottom:12px">';
  h+='<div style="font-size:13px;font-weight:700;margin-bottom:8px">手机扫码输入密钥</div>';
  h+='<div style="display:-webkit-box;display:flex;-webkit-box-pack:center;justify-content:center;-webkit-box-align:center;align-items:center;gap:16px">';
  h+='<div id="qr-box" style="border-radius:6px;overflow:hidden;padding:4px;border:2px solid #000;background:#fff"></div>';
  h+='<div style="text-align:left">';
  h+='<div style="font-size:11px;color:#333;margin-bottom:4px">配对码</div>';
  h+='<div id="pair-code" style="font-size:24px;font-weight:900;letter-spacing:3px;color:#000;font-family:monospace">------</div>';
  h+='<div style="font-size:11px;color:#333;margin-top:6px;line-height:1.6">手机扫码<br>输入密钥<br>Kindle 自动接收</div>';
  h+='<button class="btn-ico" onclick="showPairQR()" style="margin-top:8px">'+(pairId?'重新生成':'生成二维码')+'</button>';
  h+='</div></div></div>';
  h+='<div class="modal-footer">';
  if(S.mmKey||S.dsKey)h+='<button class="modal-btn modal-btn-danger" onclick="clearAll()">清除</button>';
  h+='<button class="modal-btn" onclick="closeCfg()">取消</button>';
  h+='<button class="modal-btn modal-btn-primary" onclick="saveKeys()">保存</button>';
  h+='</div></div></div>';
  document.getElementById('modal-root').innerHTML=h;
  showPairQR();
}

function openCfg(){S.cfgOpen=true;renderModal();}
function closeCfg(){S.cfgOpen=false;if(pairPoll){clearInterval(pairPoll);pairPoll=null;pairId=null;}renderModal();}
function saveKeys(){
  var mmEl=document.getElementById('mm-input'),dsEl=document.getElementById('ds-input');
  var mm=mmEl?(mmEl.value.replace(/^\s+|\s+$/g,'')):'',ds=dsEl?(dsEl.value.replace(/^\s+|\s+$/g,'')):'';
  if(mm){S.mmKey=mm;localStorage.setItem('kd-mm',mm);}
  if(ds){S.dsKey=ds;localStorage.setItem('kd-ds',ds);}
  S.cfgOpen=false;render();syncAll();
}
function clearAll(){
  S.mmKey='';S.dsKey='';S.mm={ok:false,sync:'--',err:null,raw:null};S.ds={ok:false,total:'0',granted:'0',topped:'0',err:null};
  localStorage.removeItem('kd-mm');localStorage.removeItem('kd-ds');
  S.cfgOpen=false;render();
}

function getPageUrl(){return location.href.split('?')[0];}

function showPairQR(){
  var qrDiv=document.getElementById('qr-box');
  var codeEl=document.getElementById('pair-code');
  if(!qrDiv)return;
  qrDiv.innerHTML='<div style="font-size:11px;padding:30px 8px;text-align:center;color:#000">...</div>';
  var blobId=Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4);
  pairId=blobId;
  xhr('https://jsonblob.com/api/jsonBlob',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:'{}'},function(err,r){
    if(!err&&r&&r.status>=200&&r.status<300){
      var loc=r.getResponseHeader('Location')||'';
      var realId=loc.split('/').pop();
      if(realId&&realId.length>2)pairId=realId;
    }
    var finalUrl=getPageUrl()+'?pair='+pairId;
    qrDiv.innerHTML='';
    QRGen.generate(qrDiv,finalUrl,130);
    var short=pairId.slice(-6).toUpperCase();
    if(codeEl)codeEl.textContent=short;
    if(pairPoll)clearInterval(pairPoll);
    pairPoll=setInterval(pollPair,3000);
  });
}

function pollPair(){
  if(!pairId)return;
  xhr('https://jsonblob.com/api/jsonBlob/'+pairId,function(err,r){
    if(err||!r||r.status!==200)return;
    try{var d=JSON.parse(r.responseText);
      if(d.mm){S.mmKey=d.mm;localStorage.setItem('kd-mm',d.mm);}
      if(d.ds){S.dsKey=d.ds;localStorage.setItem('kd-ds',d.ds);}
      if(d.mm||d.ds){clearInterval(pairPoll);pairPoll=null;pairId=null;S.cfgOpen=false;render();syncAll();}
    }catch(e){}
  });
}

function checkPairMode(){
  var search=location.search||'';
  var match=search.match(/[?&]pair=([^&]+)/);
  if(!match)return false;
  var pid=decodeURIComponent(match[1]);
  document.body.innerHTML='<div style="max-width:400px;margin:40px auto;padding:20px;font-family:-apple-system,sans-serif;background:#fff;color:#000">'
    +'<h2 style="margin-bottom:6px;color:#000">📱 扫码输入密钥</h2>'
    +'<p style="color:#333;font-size:14px;margin-bottom:24px">输入 API 密钥，Kindle 自动接收</p>'
    +'<div style="margin-bottom:16px"><label style="font-size:13px;font-weight:700;display:block;margin-bottom:6px;color:#000">MiniMax 密钥</label>'
    +'<input id="m-mm" type="text" placeholder="可留空" style="width:100%;padding:12px;border:2px solid #000;border-radius:8px;font-size:14px;font-family:monospace"></div>'
    +'<div style="margin-bottom:20px"><label style="font-size:13px;font-weight:700;display:block;margin-bottom:6px;color:#000">DeepSeek 密钥</label>'
    +'<input id="m-ds" type="text" placeholder="可留空" style="width:100%;padding:12px;border:2px solid #000;border-radius:8px;font-size:14px;font-family:monospace"></div>'
    +'<button id="m-send" onclick="sendKeys(\''+pid+'\')" style="width:100%;padding:14px;border-radius:10px;border:2px solid #000;background:#000;color:#fff;font-size:16px;font-weight:700;cursor:pointer">发送到 Kindle</button>'
    +'<div id="m-status" style="margin-top:16px;text-align:center;font-size:14px;color:#000"></div></div>';
  return true;
}

function sendKeys(pid){
  var mmEl=document.getElementById('m-mm'),dsEl=document.getElementById('m-ds');
  var mm=mmEl?(mmEl.value.replace(/^\s+|\s+$/g,'')):'',ds=dsEl?(dsEl.value.replace(/^\s+|\s+$/g,'')):'';
  if(!mm&&!ds){document.getElementById('m-status').innerHTML='<span style="color:#000;font-weight:700">请至少输入一个密钥</span>';return;}
  var btn=document.getElementById('m-send');btn.disabled=true;btn.textContent='发送中...';
  xhr('https://jsonblob.com/api/jsonBlob/'+pid,{method:'PUT',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({mm:mm,ds:ds})},function(err,r){
    if(!err&&r&&r.status>=200&&r.status<300){
      document.getElementById('m-status').innerHTML='<span style="font-size:18px;font-weight:900">✓ 发送成功！</span><br><span style="font-size:13px">Kindle 将自动接收</span>';
    }else{
      document.getElementById('m-status').innerHTML='<span style="font-weight:700">发送失败，请重试</span>';btn.disabled=false;btn.textContent='发送到 Kindle';
    }
  });
}

if(!checkPairMode()){
  render();
  fetchWeather(function(){render();});
  fetchNews();
  if(S.mmKey)syncMM();
  if(S.dsKey)syncDS();
  setInterval(function(){render();},1000);
  setInterval(function(){if(S.mmKey)syncMM();if(S.dsKey)syncDS();},5*60*1000);
}
</script>
</body>
</html>
