<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Test</title>
<style>
body{background:#fff;color:#000;font-family:sans-serif;font-size:24px;margin:20px}
.box{border:2px solid #000;padding:20px;margin:10px 0}
h1{font-size:40px}
p{font-size:20px;margin:10px 0}
</style>
</head>
<body>
<h1>Kindle 测试页</h1>
<div class="box">
<p>如果你能看到这段文字，说明 HTML 渲染正常。</p>
<p>当前时间：<span id="t">--:--</span></p>
</div>
<script>
try{
  document.getElementById('t').innerHTML=new Date().toLocaleTimeString();
  var x=document.createElement('p');
  x.innerHTML='JS 执行正常';
  document.body.appendChild(x);
}catch(e){
  document.body.innerHTML+='<p style="color:red">JS Error: '+e.message+'</p>';
}
</script>
</body>
</html>
